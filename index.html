<!DOCTYPE html>
<html>
<head>
    <title>Dice Roller</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin-top: 50px;
        }

        #result {
            font-size: 50px;
            margin: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Dice Roller 🎲</h1>

    <div id="result">🎲</div>

    <button onclick="rollDice()">Roll Dice</button>

    <script>
        function rollDice() {
            // Generate random number between 1 and 6
            let randomNumber = Math.floor(Math.random() * 6) + 1;

            // Display number
            document.getElementById("result").innerText = randomNumber;
        }
    </script>

</body>
</html>
